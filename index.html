<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>


    <div class="container">
        <header>
            <h1>
              🚨Redd Miljøet!!!🚨
            </h1>
        </header>
    
        <main>
            <section id="hero">
                <img src="./images/hero-image-bad.png"/>
                <a href="#help">Hjelp i dag</a>
                <p>
                    Miljøet står i fare!! hjelp oss redde miljøet i dag. før det er for seint!
                </p>
            </section>

            <section id="help">
                <a href="#hero">
                    <img src="./images/hero-image.png"/>
                </a>

                <form post="/">
                    <label>Navn</label>
                    <input placeholder="Navn">
                    <br>

                    <label>E-Mail</label>
                    <input type="email" placeholder="E-Mail">
                    <br>

                    <label for="amount">Mengde:</label>
                    <input type="number" name="amount" id="" placeholder="NOK">
                    <br>

                    <button type="submit">Send</button>
                </form>
            </section>
        </main>
    </div>

    <footer>
        <a href="#hero">Return To Top</a>
    </footer>

    
</body>
</html>
