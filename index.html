<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="./app.js"defer></script>
    <title>Redd Miljøet</title>
</head>
<body>
    <div class="container">
        <header>
            <h1>
              🚨Redd Miljøet!!!🚨
            </h1>
        </header>
    
        <main>
            <section id="hero">
                <img src="./images/hero-image-bad.png"/>
                <p>
                    Miljøet står i fare!! hjelp oss redde miljøet i dag. før det er for seint!
                </p>
                <button onclick="app.down()">
                    Hjelp i dag
                </button>
            </section>

            <section id="help">
                <img src="./images/hero-image.png"/>
                <form post="/">
                    <label>Navn</label>
                    <input placeholder="Navn">
                    <br>

                    <label>E-Mail</label>
                    <input type="email" placeholder="E-Mail">
                    <br>

                    <label for="amount">Mengde:</label>
                    <input type="number" name="amount" id="" placeholder="NOK">
                    <br>

                    <button type="submit">Send</button>
                </form>
            </section>
        </main>
    </div>

    <footer>
        <div class="footer-container">
            <img src="./images/arrow-circle-up.svg" onclick="app.up()">
            <img src="./images/arrow-circle-down.svg" onclick="app.down()">
        </div>
    </footer>
</body>
</html>
